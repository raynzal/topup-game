<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 70" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="bgGradHover" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#93C5FD"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#3B82F6" flood-opacity="0.5"/>
    </filter>
    <filter id="iconGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#3B82F6" flood-opacity="0.6"/>
    </filter>
    <clipPath id="hexClip">
      <polygon points="26,2 48,2 58,24 48,46 26,46 16,24"/>
    </clipPath>
  </defs>

  <!-- Icon: Hexagon with Z -->
  <g filter="url(#iconGlow)">
    <polygon points="26,4 47,4 57,24 47,44 26,44 16,24" fill="url(#bgGrad)" stroke="#60A5FA" stroke-width="1.5"/>
    <!-- Inner glow line -->
    <polygon points="26,6 46,6 55,24 46,42 26,42 17,24" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  </g>
  <text x="36" y="34" font-family="'Plus Jakarta Sans', Inter, sans-serif" font-weight="800" font-size="26" fill="white" text-anchor="middle" filter="url(#glow)">Z</text>

  <!-- Text -->
  <text x="72" y="32" font-family="'Plus Jakarta Sans', Inter, sans-serif" font-weight="700" font-size="28" fill="url(#textGrad)" letter-spacing="-0.5">Zall</text>
  <text x="72" y="56" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="18" fill="#64748B" letter-spacing="2">STORE</text>
  <!-- Small dot -->
  <circle cx="187" cy="32" r="2.5" fill="#3B82F6"/>

  <!-- Tagline -->
  <text x="194" y="33" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="9" fill="#94A3B8">TOP UP</text>
  <text x="194" y="44" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="9" fill="#94A3B8">GAME</text>
</svg>
